<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary result</title>
</head>
<body>
    <div class="container">
    <div class="result-card">
        <h3>Your Result</h3>
        <div class="score-circle">
            <div class="score">
        <h1>76</h1>
        <p>of 100</p>
        </div>
        </div>
        <h2>Great</h2>
        <p>You scored higher than 65%
             of the people who have taken
              these tests.</p>
    </div>
    <div class="Summary-card">
        <h2>Summary</h2>
        <div class="reaction-item">
            <img src="images/icon-reaction.svg" alt="icon-reaction">
            <span>Reaction</span>
            <p><strong>80</strong> / 100</p>
            </div>
            <div class="memory-item">
            <img src="images/icon-memory.svg" alt="icon-memory">
            <span>Memory</span>
            <p><strong>92</strong> / 100</p>
            </div>
            <div class="verbal-item">
            <img src="images/icon-verbal.svg" alt="icon-verbal">
            <span>Verbal</span>
            <p><strong>61</strong> / 100</p>
            </div>
            <div class="visual-item">
            <img src="images/icon-visual.svg" alt="icon-visual">
            <span>Visual</span>
            <p><strong>73</strong> / 100</p>
            </div>
            <button class="btn">Continue</button>
        
    </div>
    </div>
</body>
</html>
